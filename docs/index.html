<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CareerCat · Workspace · Painted background</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ---- design tokens (lifted from globals.css) ---- */
  :root {
    --ink-700: #011a55;
    --ink-600: #102258;
    --ink-500: #1f3270;
    --ink-50:  #f4f6fb;
    --honey-200: #ffd98a;
    --honey-300: #ffc358;
    --honey-400: #ffb238;
    --honey-500: #f59f1c;
    --honey-600: #cc7d10;
    --honey-700: #9b5e0b;
    --cream-50: #fdfbf6;
    --cream-100: #f7f1e1;
    --cream-200: #efe4c8;
    --blue-100: #dbeafe;
    --blue-200: #bfdbfe;
    --blue-500: #3b82f6;
    --blue-600: #2563eb;
    --blue-700: #1d4ed8;
    --neutral-50: #f8f9fc;
    --neutral-200: #dde2ec;
    --neutral-500: #626b80;
    --neutral-700: #2a3142;
    --neutral-900: #0d111a;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;

    --font-sans: "Geist", "Inter", system-ui, -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;

    /* glass card on top of the painting */
    --card-bg: rgba(255, 255, 255, 0.78);
    --card-bg-strong: rgba(255, 255, 255, 0.92);
    --card-border: rgba(255, 255, 255, 0.65);
    --card-border-strong: rgba(1, 26, 85, 0.10);
    --shadow-card: 0 1px 0 rgba(255,255,255,0.6) inset, 0 12px 32px -16px rgba(1, 26, 85, 0.22), 0 2px 8px -2px rgba(1, 26, 85, 0.10);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--neutral-900);
    background: var(--cream-50);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* ---- painted background layer ---- */
  .painting-stage {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .painting-stage::after {
    /* soft top-down readability gloss to keep text legible */
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        120% 80% at 30% 20%,
        rgba(253, 251, 246, 0.0) 0%,
        rgba(253, 251, 246, 0.12) 40%,
        rgba(253, 251, 246, 0.32) 70%,
        rgba(253, 251, 246, 0.55) 100%
      );
  }
  #app { position: relative; z-index: 1; min-height: 100vh; }

  /* ---- topbar ---- */
  .ws-shell { display: flex; flex-direction: column; min-height: 100vh; }
  .ws-topbar {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 14px 24px;
    background: linear-gradient(
      to bottom,
      rgba(253, 251, 246, 0.85) 0%,
      rgba(253, 251, 246, 0.55) 70%,
      rgba(253, 251, 246, 0) 100%
    );
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
  }
  .ws-topbar-left, .ws-topbar-right {
    display: flex; align-items: center; gap: 12px; min-width: 0;
  }
  .ws-icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--card-bg-strong);
    border: 1px solid var(--card-border-strong);
    color: var(--ink-700);
    cursor: pointer;
    transition: background 140ms ease, transform 140ms ease;
  }
  .ws-icon-btn:hover { background: #fff; }
  .ws-logo { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .ws-logo-mark {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--cream-50);
    border: 1px solid rgba(1, 26, 85, 0.12);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset;
  }
  .ws-logo-name {
    font-weight: 700; letter-spacing: -0.01em; color: var(--ink-700);
    font-size: 17px;
  }
  .ws-topbar-divider {
    width: 1px; height: 18px; background: rgba(1,26,85,0.18);
    margin: 0 4px;
  }
  .ws-topbar-page {
    color: var(--neutral-700); font-size: 13.5px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ws-pill {
    height: 36px; padding: 0 14px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 140ms ease, transform 140ms ease;
    border: 1px solid transparent;
  }
  .ws-pill-ghost {
    background: var(--card-bg-strong);
    color: var(--ink-700);
    border-color: var(--card-border-strong);
    min-width: 36px; justify-content: center;
  }
  .ws-pill-ghost:hover { background: #fff; }
  .ws-pill-primary {
    background: var(--ink-700);
    color: #fff;
    box-shadow: 0 4px 12px -4px rgba(1,26,85,0.55);
  }
  .ws-pill-primary:hover { background: var(--ink-600); }
  .ws-avatar {
    width: 36px; height: 36px; border-radius: 999px;
    background: linear-gradient(135deg, var(--honey-300), var(--honey-500));
    color: var(--ink-700); font-weight: 700; font-size: 13px;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 4px 10px -4px rgba(1,26,85,0.4);
  }

  /* ---- main grid ---- */
  .ws-main {
    width: 100%; max-width: 1280px; margin: 0 auto;
    padding: 28px 24px 80px;
    display: grid; gap: 28px;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
  }
  @media (max-width: 980px) {
    .ws-main { grid-template-columns: 1fr; padding-bottom: 120px; }
  }
  .ws-col { min-width: 0; }

  .ws-eyebrow {
    color: var(--honey-700);
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
  }
  .ws-eyebrow-sm { font-size: 11px; }
  .ws-title {
    margin: 10px 0 0;
    font-size: clamp(28px, 3.4vw, 40px);
    line-height: 1.12; letter-spacing: -0.02em;
    color: var(--ink-700);
    font-weight: 700;
    max-width: 22ch; text-wrap: pretty;
  }
  .ws-title-accent {
    background: linear-gradient(110deg, var(--honey-500) 0%, var(--honey-700) 60%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .ws-subtitle {
    margin: 14px 0 0;
    color: var(--neutral-700);
    font-size: 15px; line-height: 1.65; max-width: 60ch;
    text-wrap: pretty;
  }

  /* ---- glass card ---- */
  .ws-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    box-shadow: var(--shadow-card);
    padding: 20px;
  }
  .ws-card.ws-goal { margin-top: 24px; padding: 22px; }

  .ws-textarea {
    width: 100%; min-height: 140px;
    resize: vertical;
    margin-top: 10px; padding: 14px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--card-border-strong);
    background: rgba(255,255,255,0.85);
    font-family: inherit; font-size: 14.5px; line-height: 1.6;
    color: var(--neutral-900);
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }
  .ws-textarea::placeholder { color: var(--neutral-500); }
  .ws-textarea:focus {
    border-color: var(--ink-500);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(1, 26, 85, 0.10);
  }

  .ws-goal-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }

  .ws-btn {
    height: 40px; padding: 0 16px; border-radius: 10px;
    font-family: inherit; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: 1px solid transparent;
  }
  .ws-btn-primary {
    background: var(--ink-700); color: #fff;
    box-shadow: 0 6px 14px -6px rgba(1,26,85,0.65);
  }
  .ws-btn-primary:hover { background: var(--ink-600); }
  .ws-btn-primary:disabled, .ws-btn-primary.is-loading {
    background: var(--ink-500); cursor: progress; opacity: 0.85;
  }
  .ws-btn-secondary {
    background: rgba(255,255,255,0.85);
    color: var(--ink-700);
    border-color: var(--card-border-strong);
  }
  .ws-btn-secondary:hover { background: #fff; }
  .ws-btn-block { width: 100%; height: 44px; }

  .ws-spinner {
    width: 14px; height: 14px; border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    animation: ws-spin 0.75s linear infinite;
  }
  @keyframes ws-spin { to { transform: rotate(360deg); } }

  /* ---- starters ---- */
  .ws-starters { margin-top: 28px; }
  .ws-starter-grid { display: grid; gap: 10px; margin-top: 12px; }
  .ws-starter {
    display: grid; grid-template-columns: 28px 1fr; gap: 12px;
    text-align: left; cursor: pointer;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    font: inherit; color: var(--neutral-700);
  }
  .ws-starter:hover {
    background: rgba(255,255,255,0.95);
    border-color: rgba(1,26,85,0.18);
  }
  .ws-starter-no {
    font-family: var(--font-mono); font-size: 11px; color: var(--honey-700);
    padding-top: 1px;
  }
  .ws-starter-text { font-size: 14px; line-height: 1.6; }

  /* ---- plan panel ---- */
  .ws-plan { padding: 22px; }
  .ws-plan-head {
    display: flex; gap: 16px; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap;
  }
  .ws-plan-title {
    margin: 6px 0 0; font-size: 20px; line-height: 1.35;
    color: var(--ink-700); font-weight: 700; letter-spacing: -0.01em;
    text-wrap: balance;
  }

  .ws-status-pill {
    display: inline-flex; align-items: center;
    padding: 6px 11px; border-radius: 8px;
    border: 1px solid; font-size: 12px; font-weight: 600;
    white-space: nowrap;
  }
  .ws-status-ready    { color: #9b5e0b; border-color: rgba(255,178,56,0.55); background: rgba(255,178,56,0.18); }
  .ws-status-planned  { color: var(--neutral-700); border-color: rgba(1,26,85,0.18); background: rgba(255,255,255,0.7); }
  .ws-status-blocked  { color: #b41f1f; border-color: rgba(239,73,73,0.4); background: rgba(239,73,73,0.12); }
  .ws-status-complete { color: #1f8b4f; border-color: rgba(52,193,113,0.4); background: rgba(52,193,113,0.14); }

  /* empty / planning / planned variants */
  .ws-plan-empty {
    margin-top: 18px;
    padding: 24px;
    border-radius: var(--radius-md);
    border: 1px dashed rgba(1,26,85,0.18);
    background: rgba(255,255,255,0.5);
    display: grid; grid-template-columns: 44px 1fr; gap: 16px; align-items: center;
    color: var(--neutral-700); font-size: 14px; line-height: 1.6;
  }
  .ws-empty-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(1,26,85,0.06); color: var(--ink-700);
    display: inline-flex; align-items: center; justify-content: center;
  }

  .ws-plan-loading { margin-top: 18px; }
  .ws-think { display: inline-flex; gap: 6px; }
  .ws-think-dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--ink-700); opacity: 0.4;
    animation: ws-think 1.2s infinite ease-in-out;
  }
  .ws-think-dot:nth-child(2) { animation-delay: 0.15s; }
  .ws-think-dot:nth-child(3) { animation-delay: 0.30s; }
  @keyframes ws-think {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-3px); opacity: 1; }
  }
  .ws-think-label {
    margin: 12px 0 18px;
    color: var(--neutral-700); font-size: 13.5px;
  }
  .ws-skeleton-stack { display: grid; gap: 12px; }
  .ws-skel {
    height: 14px; border-radius: 7px;
    background: linear-gradient(90deg,
      rgba(1,26,85,0.06) 0%,
      rgba(1,26,85,0.12) 50%,
      rgba(1,26,85,0.06) 100%);
    background-size: 200% 100%;
    animation: ws-shimmer 1.4s infinite linear;
  }
  .ws-skel-lg { height: 60px; }
  .ws-skel-md { height: 44px; }
  .ws-skel-sm { width: 60%; }
  @keyframes ws-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .ws-plan-body { margin-top: 18px; display: grid; gap: 18px; }
  .ws-reply {
    border-radius: var(--radius-md);
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(255,178,56,0.08), rgba(255,178,56,0.02));
    border: 1px solid rgba(255,178,56,0.28);
  }
  .ws-reply-label {
    margin: 0; font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--honey-700);
  }
  .ws-reply-text { margin: 8px 0 0; font-size: 14px; line-height: 1.65; color: var(--neutral-900); }
  .ws-reply-q { margin: 10px 0 0; font-size: 13.5px; line-height: 1.6; color: var(--honey-700); font-weight: 500; }

  .ws-stages { display: grid; gap: 10px; }
  .ws-stage {
    border: 1px solid var(--card-border-strong);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    background: rgba(255,255,255,0.7);
  }
  .ws-stage.is-active {
    border-color: rgba(255,178,56,0.5);
    background: rgba(255,247,228,0.85);
    box-shadow: 0 8px 24px -16px rgba(255,178,56,0.6);
  }
  .ws-stage-head {
    display: flex; gap: 12px; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap;
  }
  .ws-stage-prefix {
    margin: 0; font-size: 11px; color: var(--neutral-500);
    font-family: var(--font-mono);
  }
  .ws-stage-title {
    margin: 4px 0 0; font-size: 15px; line-height: 1.4;
    color: var(--ink-700); font-weight: 700; letter-spacing: -0.005em;
  }
  .ws-stage-action {
    margin: 8px 0 0; font-size: 13.5px; line-height: 1.6; color: var(--neutral-700);
  }
  .ws-stage-meta {
    display: grid; gap: 4px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    margin-top: 10px;
    font-size: 12px; color: var(--neutral-500);
  }
  @media (max-width: 720px) { .ws-stage-meta { grid-template-columns: 1fr; } }
  .ws-stage-output {
    margin: 8px 0 0; font-size: 12px; color: var(--neutral-500);
    font-family: var(--font-mono);
  }

  .ws-meta-grid {
    display: grid; gap: 14px 18px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    border-radius: var(--radius-md);
    padding: 16px;
    border: 1px solid var(--card-border-strong);
    background: rgba(255,255,255,0.6);
  }
  @media (max-width: 720px) { .ws-meta-grid { grid-template-columns: 1fr; } }
  .ws-meta-label {
    margin: 0; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--neutral-500);
  }
  .ws-meta-value {
    margin: 4px 0 0; font-size: 13.5px; line-height: 1.55; color: var(--neutral-900);
    word-break: break-word;
  }
  .ws-meta-value.is-mono { font-family: var(--font-mono); font-size: 12.5px; color: var(--neutral-700); }

  /* tweaks panel + painting opacity hint */
  body[data-painting-hidden="true"] .painting-stage { opacity: 0; }

  /* ---- flyout nav ---- */
  .ws-flyout {
    position: fixed;
    left: 12px;
    top: 64px;
    bottom: 24px;
    width: 288px;
    z-index: 30;
    padding: 14px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.86);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid rgba(1, 26, 85, 0.08);
    box-shadow: 0 24px 60px -22px rgba(1, 26, 85, 0.28), 0 4px 14px -6px rgba(1, 26, 85, 0.12);
    transform: translateX(-110%);
    opacity: 0;
    pointer-events: none;
    transition: transform 280ms cubic-bezier(.22,.8,.32,1), opacity 220ms ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ws-flyout.is-open {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }
  .ws-flyout-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .ws-flyout-item {
    appearance: none;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    cursor: pointer;
    color: var(--ink);
    transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
  }
  .ws-flyout-item:hover {
    background: rgba(255, 178, 56, 0.12);
    border-color: rgba(255, 178, 56, 0.32);
  }
  .ws-flyout-item.is-active {
    background: rgba(1, 26, 85, 0.94);
    border-color: rgba(1, 26, 85, 0.94);
    color: #FFECBF;
  }
  .ws-flyout-item.is-active .ws-flyout-desc { color: rgba(255, 236, 191, 0.7); }
  .ws-flyout-icon {
    flex: 0 0 36px;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: rgba(1, 26, 85, 0.06);
    color: var(--ink);
  }
  .ws-flyout-item.is-active .ws-flyout-icon {
    background: rgba(255, 178, 56, 0.22);
    color: var(--honey);
  }
  .ws-flyout-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ws-flyout-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .ws-flyout-desc { font-size: 11.5px; color: var(--neutral-600); }
  .ws-flyout-foot {
    margin-top: auto;
    padding: 10px 12px;
    border-top: 1px solid rgba(1, 26, 85, 0.08);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--neutral-600);
  }
  .ws-flyout-foot-label { color: var(--ink); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

  /* ---- generic tool-page mock ---- */
  .ws-mock-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
    gap: 18px;
    margin-top: 24px;
  }
  .ws-eyebrow-sm { font-size: 11px; }
  .ws-mock-hero { padding: 28px; min-height: 360px; display: flex; flex-direction: column; gap: 16px; }
  .ws-mock-side { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .ws-mock-frame {
    flex: 1;
    border-radius: 16px;
    background:
      repeating-linear-gradient(135deg, rgba(1,26,85,0.05) 0 12px, transparent 12px 24px),
      rgba(253, 251, 246, 0.7);
    border: 1px dashed rgba(1, 26, 85, 0.18);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    padding: 28px;
  }
  .ws-mock-strip {
    height: 14px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(255, 178, 56, 0.55), rgba(255, 178, 56, 0.15));
    width: 80%;
  }
  .ws-mock-strip-2 { width: 64%; background: linear-gradient(90deg, rgba(59, 130, 246, 0.45), rgba(59, 130, 246, 0.1)); }
  .ws-mock-strip-3 { width: 46%; background: linear-gradient(90deg, rgba(1, 26, 85, 0.35), rgba(1, 26, 85, 0.06)); }
  .ws-mock-caption {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--neutral-600);
  }
  .ws-mock-list {
    list-style: none;
    padding: 0;
    margin: 4px 0 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ws-mock-list li {
    font-size: 13px;
    color: var(--neutral-700);
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(1, 26, 85, 0.04);
    border: 1px solid rgba(1, 26, 85, 0.08);
  }
</style>
</head>
<body style="font-family: Times">
  <div class="painting-stage" id="painting-root"></div>
  <div id="app"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="painting.jsx"></script>
  <script type="text/babel" src="workspace.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "state": "planned",
      "locale": "zh",
      "paintingOpacity": 1,
      "paintingVariant": "warm",
      "paintingSeed": 6,
      "flowSpeed": 80,
      "page": "\/workspace"
    }/*EDITMODE-END*/;

    function Root() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <PaintingMount {...tweaks} />
          <window.Workspace
            state={tweaks.state}
            locale={tweaks.locale}
            painting={tweaks}
            page={tweaks.page}
            onNavigate={(r) => setTweak("page", r)}
          />
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Workspace state">
              <window.TweakRadio
                label="State"
                value={tweaks.state}
                options={[
                  { value: "empty",    label: "Empty" },
                  { value: "planning", label: "Planning" },
                  { value: "planned",  label: "Planned" }
                ]}
                onChange={(v) => setTweak("state", v)}
              />
              <window.TweakRadio
                label="Language"
                value={tweaks.locale}
                options={[
                  { value: "en", label: "EN" },
                  { value: "zh", label: "中文" }
                ]}
                onChange={(v) => setTweak("locale", v)}
              />
              <window.TweakSelect
                label="Page"
                value={tweaks.page}
                options={[
                  { value: "/workspace",       label: tweaks.locale === "zh" ? "工作台"     : "Workspace" },
                  { value: "/profile",         label: tweaks.locale === "zh" ? "个人资料"   : "Profile" },
                  { value: "/import-jobs",     label: tweaks.locale === "zh" ? "导入岗位"   : "Import Jobs" },
                  { value: "/recommendations", label: tweaks.locale === "zh" ? "岗位推荐"   : "Recommendations" },
                  { value: "/dashboard",       label: tweaks.locale === "zh" ? "投递面板"   : "Dashboard" },
                  { value: "/insights",        label: tweaks.locale === "zh" ? "进度看板"   : "Insights" },
                  { value: "/coach",           label: tweaks.locale === "zh" ? "AI 教练"    : "Coach" },
                ]}
                onChange={(v) => setTweak("page", v)}
              />
            </window.TweakSection>
            <window.TweakSection label="Painted background">
              <window.TweakSlider
                label="Opacity"
                min={0} max={100} step={5}
                unit="%"
                value={Math.round(tweaks.paintingOpacity * 100)}
                onChange={(v) => setTweak("paintingOpacity", v / 100)}
              />
              <window.TweakRadio
                label="Variant"
                value={tweaks.paintingVariant}
                options={[
                  { value: "warm", label: "Warm" },
                  { value: "cool", label: "Cool" }
                ]}
                onChange={(v) => setTweak("paintingVariant", v)}
              />
              <window.TweakSlider
                label="Seed"
                min={1} max={20} step={1}
                value={tweaks.paintingSeed}
                onChange={(v) => setTweak("paintingSeed", v)}
              />
              <window.TweakSlider
                label="Flow speed"
                min={0} max={300} step={10}
                unit="%"
                value={tweaks.flowSpeed}
                onChange={(v) => setTweak("flowSpeed", v)}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    function PaintingMount({ paintingOpacity, paintingVariant, paintingSeed, flowSpeed }) {
      const root = React.useRef(null);
      React.useEffect(() => {
        const el = document.getElementById("painting-root");
        if (!root.current) root.current = ReactDOM.createRoot(el);
        root.current.render(
          <window.Painting
            opacity={paintingOpacity}
            variant={paintingVariant}
            seed={paintingSeed}
            flowSpeed={(flowSpeed ?? 100) / 100}
          />
        );
      }, [paintingOpacity, paintingVariant, paintingSeed, flowSpeed]);
      return null;
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<Root />);
  </script>
</body>
</html>
